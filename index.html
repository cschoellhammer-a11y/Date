<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Date ❤️</title>

  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body>

  <!-- Canvas-fyrværkeri -->
  <canvas id="fireworksCanvas"></canvas>


  <!-- =====================================
       STARTSIDE
  ====================================== -->

  <section
    id="introScreen"
    class="screen active"
  >

    <div
      id="introContent"
      class="content hidden"
    >

      <h1>Hej Smukke</h1>

      <p class="subtitle">
        Det lykkedes mig hehe 😉❤️
      </p>

      <button
        id="giftButton"
        class="gift-button"
        aria-label="Åbn gaven"
      >

        <span class="gift">
          🎁
        </span>

        <span class="gift-label">
          Klik her
        </span>

      </button>

    </div>

  </section>


  <!-- =====================================
       DATE-SPØRGSMÅL
  ====================================== -->

  <section
    id="dateScreen"
    class="screen"
  >

    <div class="content">

      <h1>
        Skal vi tage på en date? ❤️
      </h1>

      <div
        id="dateButtons"
        class="button-row hidden"
      >

        <button
          id="yesButton"
          class="main-button yes-button"
        >
          JA
        </button>

        <button
          id="noButton"
          class="main-button no-button"
        >
          Nej..
        </button>

      </div>

    </div>

  </section>


  <!-- =====================================
       JA-FEST
  ====================================== -->

  <section
    id="celebrationScreen"
    class="screen"
  >

    <div class="content celebration-content">

      <h1>YESSS! 🎉</h1>

      <div class="celebration-gif-container">

        <img
          src="https://i.gifer.com/VZvx.gif"
          alt="Glad fejring"
          class="celebration-gif"
        >

      </div>

      <div
        id="speechBubble"
        class="speech-bubble hidden"
      >
        Jeg er så heldig ❤️
      </div>

    </div>

  </section>


  <!-- =====================================
       VALG AF DATE
  ====================================== -->

  <section
    id="activityScreen"
    class="screen scroll-screen"
  >

    <div class="content wide">

      <h1>
        Hvad kunne du godt tænke dig? 😍
      </h1>

      <div class="options-grid">

        <button
          class="option-button"
          data-choice="PadelBoard"
        >
          🏄‍♀️ PadelBoard
        </button>

        <button
          class="option-button"
          data-choice="Strandtur"
        >
          🔥 Engangsgrill, picnictaske og så på stranden
        </button>

        <button
          class="option-button"
          data-choice="Silkeborg"
        >
          🌲 Kærestetur til Silkeborg
        </button>

        <button
          class="option-button"
          data-choice="Spaophold"
        >
          🧖‍♀️ Spaophold
        </button>

        <button
          class="option-button"
          data-choice="Glamping"
        >
          ⛺ Glamping
        </button>

        <button
          class="option-button"
          data-choice="Galopbanen"
        >
          🐎 Galopbanen
        </button>

        <button
          class="option-button"
          data-choice="Film og snacks"
        >
          🍿 Hygge med snacks og film
        </button>

      </div>

    </div>

  </section>


  <!-- =====================================
       VALG AF TIDSPUNKT
  ====================================== -->

  <section
    id="timeScreen"
    class="screen"
  >

    <div class="content wide">

      <h1>
        Vælg tidspunkt 📅
      </h1>

      <p
        id="selectedActivity"
        class="selection-text"
      ></p>

      <div class="time-options">

        <button
          class="option-button time-button"
          data-time="Uge 30"
        >
          📅 Uge 30
        </button>

        <button
          class="option-button time-button"
          data-time="Weekend i Juli"
        >
          ☀️ Weekend i Juli
        </button>

        <button
          class="option-button time-button"
          data-time="Weekend i August"
        >
          ☀️ Weekend i August
        </button>

      </div>

    </div>

  </section>


  <!-- =====================================
       SLUTDANS
  ====================================== -->

  <section
    id="finalScreen"
    class="screen"
  >

    <div class="final-fireworks-background">

      <img
        src="https://gifdb.com/images/thumbnail/sparkling-heart-fireworks-i5hg1mixbcuv6a49.gif"
        alt=""
        class="final-fireworks-gif"
      >

    </div>

    <div class="content final-content">

      <div class="final-celebration-small">

        <img
          src="https://i.gifer.com/VZvx.gif"
          alt="Glad fejring"
          class="final-celebration-gif"
        >

      </div>

      <div class="couple-dance-container">

        <img
          src="https://cdnl.iconscout.com/lottie/premium/thumb/a-couple-is-dancing-animation-download-in-lottie-json-gif-static-svg-file-formats--together-celebration-of-love-romantic-dance-harmonious-graceful-movements-dating-pack-relationship-animations-10201288.gif"
          alt="Dansende par"
          class="couple-dance-gif"
        >

      </div>

      <h1 class="final-heading">
        JEG GLÆDER MIG ❤️
      </h1>

      <p
        id="finalChoice"
        class="selection-text"
      ></p>

    </div>

  </section>


  <!-- =====================================
       TYPING-SIDE
  ====================================== -->

  <section
    id="typingScreen"
    class="screen typing-screen"
  >

    <div class="typing-container">

      <div
        id="typingText"
        class="typing-text"
      ></div>

      <span
        id="typingCursor"
        class="typing-cursor"
      >
        |
      </span>

    </div>

  </section>


  <!-- =====================================
       SORT SLUTSKÆRM
  ====================================== -->

  <div id="blackoutScreen"></div>


  <!-- =====================================
       ERROR POPUP
  ====================================== -->

  <div
    id="errorPopup"
    class="popup"
  >

    <button
      id="closePopup"
      class="close-popup"
      aria-label="Luk"
    >
      ×
    </button>

    <div class="error-icon">
      ❌
    </div>

    <h2>Error</h2>

    <p>
      Prøv JA 😏
    </p>

  </div>


  <script src="script.js"></script>

</body>
</html>
