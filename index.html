<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Date ❤️</title>

  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body>

  <canvas id="fireworksCanvas"></canvas>


  <!-- STARTSIDE -->
  <section
    id="introScreen"
    class="screen active"
  >

    <div
      id="introContent"
      class="content hidden"
    >

      <h1>Hej Flotte</h1>

      <p class="subtitle">
        Det lykkedes mig hehe 😉❤️
      </p>

      <button
        id="giftButton"
        class="gift-button"
        aria-label="Åbn gaven"
      >

        <span class="gift">
          🎁
        </span>

        <span class="gift-label">
          Klik her
        </span>

      </button>

    </div>

  </section>


  <!-- DATE-SPØRGSMÅL -->
  <section
    id="dateScreen"
    class="screen"
  >

    <div class="content">

      <h1>
        Skal vi tage på en date? ❤️
      </h1>

      <div
        id="dateButtons"
        class="button-row hidden"
      >

        <button
          id="yesButton"
          class="main-button yes-button"
        >
          JA
        </button>

        <button
          id="noButton"
          class="main-button no-button"
        >
          Nej..
        </button>

      </div>

    </div>

  </section>


  <!-- FEJRING EFTER JA -->
  <section
    id="celebrationScreen"
    class="screen"
  >

    <div class="content celebration-content">

      <h1>YESSS! 🎉</h1>

      <div class="celebration-gif-container">

        <img
          src="https://i.gifer.com/VZvx.gif"
          alt="Glad fejring"
          class="celebration-gif"
        >

      </div>

      <div
        id="speechBubble"
        class="speech-bubble hidden"
      >
        Jeg er så heldig ❤️
      </div>

    </div>

  </section>


  <!-- VALG AF AKTIVITET -->
  <section
    id="activityScreen"
    class="screen scroll-screen"
  >

    <div class="content wide">

      <h1>
        Hvad kunne du godt tænke dig? 😍
      </h1>

      <div class="options-grid">

        <button
          class="option-button"
          data-choice="PadelBoard"
        >
          🏄‍♀️ PadelBoard
        </button>

        <button
          class="option-button"
          data-choice="Strandtur"
        >
          🔥 Engangsgrill, picnictaske og så på stranden
        </button>

        <button
          class="option-button"
          data-choice="Silkeborg"
        >
          🌲 Kærestetur til Silkeborg
        </button>

        <button
          class="option-button"
          data-choice="Spaophold"
        >
          🧖‍♀️ Spaophold
        </button>

        <button
          class="option-button"
          data-choice="Glamping"
        >
          ⛺ Glamping
        </button>

        <button
          class="option-button"
          data-choice="Galopbanen"
        >
          🐎 Galopbanen
        </button>

        <button
          class="option-button"
          data-choice="Film og snacks"
        >
          🍿 Hygge med snacks og film
        </button>

      </div>

    </div>

  </section>


  <!-- GODKENDELSE MED HEST -->
  <section
    id="timeScreen"
    class="screen horse-screen"
  >

    <div class="content horse-content">

      <h1 class="horse-heading">
        Vi gør det i weekenden i uge 30
      </h1>

      <p class="horse-instruction">
        Tryk på hesten, hvis du godkender ❤️
      </p>

      <div
        id="horseArea"
        class="horse-area"
      >

        <div
          id="horseButton"
          class="horse-emoji"
          role="button"
          tabindex="0"
          aria-label="Godkend med hesten"
        >
          🐴
        </div>

        <div
          id="horseBubble"
          class="horse-bubble hidden"
        ></div>

      </div>

      <p
        id="selectedActivity"
        class="selection-text activity-reminder"
      ></p>

    </div>

  </section>


  <!-- SLUTDANS -->
  <section
    id="finalScreen"
    class="screen"
  >

    <div class="content final-content">

      <div class="couple-dance-container">

        <img
          src="https://cdnl.iconscout.com/lottie/premium/thumb/a-couple-is-dancing-animation-download-in-lottie-json-gif-static-svg-file-formats--together-celebration-of-love-romantic-dance-harmonious-graceful-movements-dating-pack-relationship-animations-10201288.gif"
          alt="Dansende par"
          class="couple-dance-gif"
        >

      </div>

      <h1 class="final-heading">
        JEG GLÆDER MIG ❤️
      </h1>

      <p
        id="finalChoice"
        class="selection-text"
      ></p>

    </div>

  </section>


  <!-- TYPING-SIDE -->
  <section
    id="typingScreen"
    class="screen typing-screen"
  >

    <div class="typing-container">

      <div
        id="typingText"
        class="typing-text"
      ></div>

      <span
        id="typingCursor"
        class="typing-cursor"
      >
        |
      </span>

    </div>

  </section>


  <!-- SORT SLUTSKÆRM -->
  <div id="blackoutScreen"></div>


  <!-- ERROR POPUP -->
  <div
    id="errorPopup"
    class="popup"
  >

    <button
      id="closePopup"
      class="close-popup"
      aria-label="Luk"
    >
      ×
    </button>

    <div class="error-icon">
      ❌
    </div>

    <h2>Error</h2>

    <p>
      Prøv JA 😏
    </p>

  </div>


  <script src="script.js"></script>

</body>
</html>
