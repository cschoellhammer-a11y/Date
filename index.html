<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Date ❤️</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- STARTSIDE -->
  <section id="introScreen" class="screen active">
    <div id="introContent" class="hidden">
      <h1>Hej Flotte</h1>

      <p class="subtitle">
        Det lykkedes mig hehe 😉❤️
      </p>

      <button id="giftButton" class="gift-button">
        <span class="gift">🎁</span>
        <span class="gift-text">Klik her</span>
      </button>
    </div>
  </section>

  <!-- DATE-SPØRGSMÅL -->
  <section id="dateScreen" class="screen">
    <h1>Skal vi tage på en date? ❤️</h1>

    <div id="dateButtons" class="button-row hidden">
      <button id="yesButton" class="main-button yes-button">
        JA
      </button>

      <button id="noButton" class="main-button no-button">
        Nej..
      </button>
    </div>
  </section>

  <!-- STICKMAN-FEST -->
<section id="celebrationScreen" class="screen">

  <h1>YESSS! 🎉</h1>

  <div class="hip-dancer">
    <div class="dancer-head smiling-face">
      <span class="eye eye-left"></span>
      <span class="eye eye-right"></span>
      <span class="smile"></span>
    </div>

    <div class="dancer-body"></div>

    <div class="dancer-arm dancer-arm-left"></div>
    <div class="dancer-forearm dancer-forearm-left"></div>

    <div class="dancer-arm dancer-arm-right"></div>
    <div class="dancer-forearm dancer-forearm-right"></div>

    <div class="dancer-leg dancer-leg-left"></div>
    <div class="dancer-leg dancer-leg-right"></div>
  </div>

  <div id="speechBubble" class="speech-bubble hidden">
    Jeg er så heldig ❤️
  </div>

</section>

  <!-- VALG AF DATE -->
  <section id="activityScreen" class="screen scroll-screen">
    <h1>Hvad kunne du godt tænke dig? 😍</h1>

    <div class="options-grid">
      <button class="option-button" data-choice="PadelBoard">
        🏄‍♀️ PadelBoard - til stranden med engangsgrill 
      </button>

      <button class="option-button" data-choice="Strandtur">
        🔥 Tivoli (Lørdag)
      </button>

      <button class="option-button" data-choice="Silkeborg">
        🌲 Kærestetur til Silkeborg
      </button>

      <button class="option-button" data-choice="Glamping">
        ⛺ Tur til Samsø, måske på Glamping
      </button>

      <button class="option-button" data-choice="Galopbanen">
        🐎 Galopbanen (Fredag)
      </button>

      <button class="option-button" data-choice="Film og snacks">
        🍿 Hygge med Vin, Pizz, snacks og film
      </button>
    </div>
  </section>

  <!-- VALG AF TIDSPUNKT -->
  <section id="timeScreen" class="screen">
    <h1>Tidspunktet er 📅</h1>

    <p id="selectedActivity" class="selection-text"></p>

    <div class="time-options">
      <button class="option-button time-button" data-time="Uge 30">
        📅 Uge 30
      </button>
    </div>
  </section>

<!-- SLUTSIDE -->
<section id="finalScreen" class="screen">

  <div class="dance-scene">

    <div class="dance-couple">

      <!-- STICK MAN -->
      <div class="dance-person dance-man">

        <div class="dance-head smiling-face">
          <span class="eye eye-left"></span>
          <span class="eye eye-right"></span>
          <span class="smile"></span>
        </div>

        <div class="short-hair"></div>

        <div class="dance-body"></div>

        <div class="dance-arm man-arm-left"></div>
        <div class="dance-arm man-arm-right"></div>

        <div class="dance-leg man-leg-left"></div>
        <div class="dance-leg man-leg-right"></div>

      </div>

      <!-- HÆNDER -->
      <div class="joined-hands">🤝</div>

      <!-- STICK DAME -->
      <div class="dance-person dance-woman">

        <div class="dance-head smiling-face">
          <span class="eye eye-left"></span>
          <span class="eye eye-right"></span>
          <span class="smile"></span>
        </div>

        <div class="blonde-hair"></div>

        <div class="woman-dress"></div>

        <div class="dance-arm woman-arm-left"></div>
        <div class="dance-arm woman-arm-right"></div>

        <div class="dance-leg woman-leg-left"></div>
        <div class="dance-leg woman-leg-right"></div>

      </div>

    </div>

  </div>

  <h1 class="final-heading">JEG GLÆDER MIG ❤️</h1>

  <p id="finalChoice" class="selection-text"></p>

</section>

  <!-- ERROR POPUP -->
  <div id="errorPopup" class="popup">
    <button id="closePopup" class="close-popup">×</button>

    <div class="error-icon">❌</div>

    <h2>Error</h2>

    <p>Prøv JA 😏</p>
  </div>

  <!-- EFFEKTER -->
  <div id="effectsContainer"></div>

  <script src="script.js"></script>

</body>
</html>
